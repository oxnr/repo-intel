name: Demo — React vs Vue vs Svelte
on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: oxnr/repo-intel@v1
        with:
          repos: 'facebook/react,vuejs/core,sveltejs/svelte'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-format: issue
          period-days: '30'
